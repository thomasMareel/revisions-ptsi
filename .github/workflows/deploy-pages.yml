name: Déploiement GitHub Pages (statique)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurer Pages
        uses: actions/configure-pages@v5
      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
